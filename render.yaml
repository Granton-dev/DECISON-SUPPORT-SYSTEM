databases:
  - name: dss-uembu-db
    databaseName: dss_uembu
    user: dss_user
    plan: free

services:
  - type: web
    name: dss-uembu
    runtime: python
    plan: free
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn dss_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: dss-uembu-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
